services:
  artha_gateway:
    build:
      context: ..
      dockerfile: phase_4_5_ops/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=info
  artha_frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../artha_frontend:/usr/share/nginx/html
